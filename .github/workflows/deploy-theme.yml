name: Deploy Theme (Staging only)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to deploy"
        default: "staging"
        required: true
      theme_id:
        description: "Target STAGING Theme ID (unpublished)"
        required: true

concurrency:
  group: theme-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Install Shopify CLI
        run: |
          npm i -g @shopify/cli @shopify/theme

      - name: Push to STAGING theme
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}     # e.g. echhtp-4a.myshopify.com
          SHOPIFY_CLI_TTY: 0
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
        run: |
          shopify theme push \
            --store "$SHOPIFY_FLAG_STORE" \
            --theme ${{ github.event.inputs.theme_id }} \
            --unpublished \
            --json
